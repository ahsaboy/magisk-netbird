name: Release Magisk NetBird Module

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      netbird_version:
        description: 'NetBird version (e.g., 0.73.0)'
        required: true
      bump:
        description: 'Module version bump'
        required: false
        default: 'patch'
        type: choice
        options: [none, major, minor, patch]

permissions:
  contents: write

env:
  GO_VERSION: '1.22'
  NB_DATA: '/data/adb/netbird'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-go@v5
        with:
          go-version: '${{ env.GO_VERSION }}'
          cache: true

      - name: Determine versions
        id: ver
        run: |
          NB_VER="${{ github.event.inputs.netbird_version || '0.73.0' }}"
          echo "nb_version=$NB_VER" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.bump }}" != "none" ] && \
             [ -n "${{ github.event.inputs.bump }}" ]; then
            bash .github/tools/version-bump.sh "${{ github.event.inputs.bump }}"
          fi
          echo "module_version=$(grep '^version=' module.prop | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with: { scandir: '.', severity: warning }

      - name: Sync NetBird version
        run: |
          sed -i "s|^NB_VERSION=.*|NB_VERSION=\"${{ steps.ver.outputs.nb_version }}\"|" customize.sh

      - name: Clone and patch NetBird source
        run: |
          NB_VER="${{ steps.ver.outputs.nb_version }}"
          git clone --depth 1 --branch "v${NB_VER}" https://github.com/netbirdio/netbird.git src

          # Patch hardcoded Linux paths to Android-writable paths
          # /etc/netbird/ -> /data/adb/netbird/data/ (config)
          # /var/log/netbird/ -> /data/adb/netbird/run/ (logs)
          # /var/run/netbird.sock -> /data/adb/netbird/run/netbird.sock (socket)
          # /var/lib/netbird/ -> /data/adb/netbird/data/ (state)
          NB_DATA="${{ env.NB_DATA }}"

          # Patch root.go: config, log, daemon paths
          sed -i "s|\"/etc/netbird/\"|\"${NB_DATA}/data/\"|g" src/client/cmd/root.go
          sed -i "s|\"/var/log/netbird/\"|\"${NB_DATA}/run/\"|g" src/client/cmd/root.go
          # Socket address includes the "unix:///" scheme prefix
          sed -i "s|\"unix:///var/run/netbird.sock\"|\"unix://${NB_DATA}/run/netbird.sock\"|g" src/client/cmd/root.go

          # Patch all /var/lib/netbird references (state directory)
          grep -rl "/var/lib/netbird" src/client/ | while read f; do
            sed -i "s|/var/lib/netbird|${NB_DATA}/data|g" "$f"
          done

          # Patch result.json cleanup path
          grep -rl "result.json" src/client/ | while read f; do
            sed -i "s|\"result.json\"|\"${NB_DATA}/run/result.json\"|g" "$f"
          done

          # Skip TLS certificate verification (Android may lack root CAs)
          # Add InsecureSkipVerify: true to ALL tls.Config in client code
          find src/client -name "*.go" -exec grep -l 'tls\.Config' {} \; | while read f; do
            # Skip files that already have InsecureSkipVerify
            grep -q 'InsecureSkipVerify' "$f" && continue
            # Add InsecureSkipVerify: true after tls.Config{
            sed -i 's/&tls\.Config{/\&tls.Config{InsecureSkipVerify: true, /g' "$f"
            sed -i 's/tls\.Config{/tls.Config{InsecureSkipVerify: true, /g' "$f"
          done
          echo "--- TLS patches applied ---"
          grep -rn 'InsecureSkipVerify' src/client/ | head -10 || echo "WARN: no patches found"

      - name: Build patched NetBird binary (arm64)
        run: |
          cd src
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" \
            -o ../netbird/bin/netbird-arm64 \
            ./client
          echo "Binary size: $(du -h ../netbird/bin/netbird-arm64 | cut -f1)"

      - name: Full ZIP
        run: |
          V="${{ steps.ver.outputs.module_version }}"
          zip -r9 "Magisk-NetBird-${V}.zip" \
            META-INF/ module.prop customize.sh service.sh uninstall.sh update.json netbird/ \
            -x '.git/*' -x '.github/*'

      - name: Checksums
        run: sha256sum *.zip > checksums.sha256

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.module_version }}
          name: "Magisk NetBird ${{ steps.ver.outputs.module_version }} (NetBird v${{ steps.ver.outputs.nb_version }})"
          generate_release_notes: true
          files: |
            Magisk-NetBird-*.zip
            checksums.sha256

      - name: Commit version
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i "s|^updateJson=.*|updateJson=https://raw.githubusercontent.com/${{ github.repository }}/main/update.json|" module.prop
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.prop update.json customize.sh
          git diff --staged --quiet || git commit -m "chore: release ${{ steps.ver.outputs.module_version }} (netbird v${{ steps.ver.outputs.nb_version }})"
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          [ "$BRANCH" = "HEAD" ] && git push origin HEAD:main || git push
